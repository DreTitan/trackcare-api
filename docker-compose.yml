services:
  postgres:
    image: postgres:16-alpine
    container_name: trackcare-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=trackcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  trackcare-api:
    build:
      context: ./src
      dockerfile: TrackCare.WebApi/Dockerfile
    container_name: trackcare-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      - PORT=8080
      - DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=trackcare;Username=postgres;Password=postgres
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped

  trackcare-web:
    build:
      context: ./src-react/trackcare-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
    container_name: trackcare-web
    ports:
      - "3000:80"
    depends_on:
      - trackcare-api
    restart: unless-stopped

volumes:
  postgres_data:
